<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <h2>Dynamic Upload Panel</h2>

  <!-- LEVEL -->
  <select id="level">
    <option value="N5">N5</option>
    <option value="N4">N4</option>
    <option value="N3">N3</option>
  </select>

  <!-- ACTION -->
  <h3>Action</h3>
  <label><input type="radio" name="action" value="upload" checked> Upload</label>
  <label><input type="radio" name="action" value="delete"> Delete</label>

  <!-- JSON INPUT -->
  <h3>Paste JSON Data</h3>
  <textarea id="jsonInput" rows="10" placeholder='[
  {"kanji":"食べる","reading":"たべる","meaning_en":"eat","meaning_np":"खानु","level":"N5"}
]'></textarea>

  <!-- RUN -->
  <button onclick="runAction()">Run</button>

  <p id="status"></p>
</div>

<script type="module" src="admin.js"></script>

</body>
</html>
