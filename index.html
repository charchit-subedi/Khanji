<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JLPT Kanji & Word Mastery</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Quick inline styles to ensure the new input area looks good */
    #test-input-area {
      background: #e8f5e9;
      padding: 15px;
      border-radius: 10px;
      border: 2px solid #4CAF50;
    }
    #answer-input {
      width: 80%;
      padding: 10px;
      font-size: 1.1rem;
      border-radius: 5px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <div id="menu" class="container">
    <h1>JLPT Mastery</h1>
    
    <div class="selection-group">
      <h3>Select Mode</h3>
      <select id="mode">
        <option value="kanji_practice">Kanji Practice</option>
        <option value="kanji_test">Kanji Test</option>
        <option value="word_practice">Word Practice</option>
        <option value="word_test">Word Test</option>
      </select>

      <h3>Select Level</h3>
      <select id="level">
        <option value="N5">N5</option>
        <option value="N4">N4</option>
        <option value="N3">N3</option>
      </select>
    </div>

    <button class="btn-start" onclick="startApp()">Start Learning</button>
  </div>

  <div id="app" class="container" style="display:none;">
    <div class="header-nav" style="display: flex; justify-content: space-between; align-items: center;">
      <h2 id="modeTitle">MODE</h2>
      <div id="score-board" style="font-weight: bold;">Score: <span id="score">0</span></div>
    </div>

    <div id="question-box">
      <h1 id="question">---</h1>
      <div id="arrow">↓</div>
      <div id="meaning-display">Loading...</div>
    </div>

    <canvas id="canvas" width="300" height="400"></canvas>
    
    <div id="test-input-area" style="display:none;">
      <input type="text" id="answer-input" placeholder="Type meaning in English...">
      <button onclick="checkAction()" style="background: #4CAF50; color: white;">Submit Answer</button>
    </div>
    
    <div class="control-buttons" id="canvas-controls">
      <button onclick="clearCanvas()" class="btn-clear">Clear</button>
      <button onclick="checkAction()" class="btn-check">Check</button>
    </div>
    
    <button id="nextBtn" onclick="nextQuestion()" style="display:none;" class="btn-next">Next Challenge →</button>

    <p id="result" style="font-weight: bold; margin-top: 10px;"></p>

    <button onclick="goBack()" class="btn-back" style="background: #f44336; color: white;">Back to Menu</button>
  </div>

  <script type="module" src="js/app.js"></script>

</body>
</html>
