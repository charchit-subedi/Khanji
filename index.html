<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>JLPT Mastery Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="auth-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:1000; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px;">
    <h1>JLPT Mastery</h1>
    <p>Sign in to save progress and get 100 bonus points!</p>
    
    <div style="width:100%; max-width:300px; margin-bottom:20px;">
        <input type="email" id="auth-email" placeholder="Email" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc;">
        <input type="password" id="auth-password" placeholder="Password" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc;">
        <div style="display:flex; gap:10px;">
            <button onclick="handleEmailLogin()" style="background:#4CAF50; color:white; flex:1; padding:10px; border-radius:5px; border:none; cursor:pointer;">Login</button>
            <button onclick="handleEmailSignup()" style="background:#2196F3; color:white; flex:1; padding:10px; border-radius:5px; border:none; cursor:pointer;">Register</button>
        </div>
    </div>

    <div style="margin:10px 0; color:#888;">— OR —</div>

    <button onclick="loginWithGoogle()" style="background:#4285F4; color:white; width:auto; padding:12px 25px; border-radius:30px; border:none; cursor:pointer; font-weight:bold;">
        Login with Google
    </button>
  </div>

  <div id="menu" class="container">
    <div id="user-info" style="margin-bottom:15px; font-weight:bold; color:#2196F3;">Syncing user...</div>
    
    <h1>JLPT Practice</h1>
    <h3>Select Mode</h3>
    <select id="mode">
      <option value="kanji_practice">Kanji Practice (Drawing)</option>
      <option value="kanji_test">Kanji Test (Drawing)</option>
      <option value="word_practice">Word Practice (Study 5 & Type)</option>
      <option value="word_test">Word Test (Random Typing)</option>
    </select>

    <h3>Select Level</h3>
    <select id="level">
      <option value="N5">N5</option>
      <option value="N4">N4</option>
      <option value="N3">N3</option>
    </select>
    
    <button id="startBtn" onclick="startApp()" style="background: #ffa500; color: white;" disabled>Connecting...</button>
    <button onclick="showAdminLogin()" style="background:#333; margin-top:15px; font-size: 0.8rem; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer;">Admin Access</button>
  </div>

  <div id="app" class="container" style="display:none;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
      <h2 id="modeTitle" style="margin: 0; font-size: 1rem; color: #666;">MODE</h2>
      <div id="score-board" style="font-weight: bold;">Score: <span id="score">0</span></div>
    </div>

    <div id="question-box">
      <h1 id="question">---</h1>
      <div id="arrow">↓</div>
      <div id="meaning-display">Initializing...</div>
    </div>

    <canvas id="canvas" width="300" height="400"></canvas>
    
    <div id="test-input-area" style="display:none; margin: 15px 0; background: #f1f8e9; padding: 15px; border-radius: 12px; border: 2px dashed #4CAF50;">
      <p style="margin: 0 0 10px 0; color: #2e7d32; font-weight: bold;">Type English meaning:</p>
      <input type="text" id="answer-input" placeholder="Type here..." style="width: 90%; padding: 12px; font-size: 1.1rem; border-radius: 8px; border: 1px solid #ccc;">
    </div>

    <div style="display: flex; gap: 10px; margin-top: 15px;">
      <button onclick="clearCanvas()" id="clearBtn" style="background: #9e9e9e; flex: 1; color: white; border:none; border-radius:5px; padding:12px; cursor:pointer;">Clear</button>
      <button onclick="checkAction()" id="checkBtn" style="flex: 2; background: #4CAF50; color: white; border:none; border-radius:5px; font-weight:bold; padding:12px; cursor:pointer;">Check Answer</button>
    </div>
    
    <div id="result-container" style="min-height: 40px; margin-top: 15px; text-align: center;">
        <p id="result" style="font-size: 1.2rem; font-weight: bold; margin: 0;"></p>
    </div>

    <button id="nextBtn" onclick="nextQuestion()" style="display:none; background: #2196F3; color: white; width: 100%; margin-top:10px; padding:15px; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">Next →</button>
    
    <button onclick="goBack()" style="background: #f44336; margin-top: 20px; color: white; width: 100%; border:none; padding:12px; border-radius:5px; cursor:pointer;">Back to Menu</button>
  </div>

  <div id="admin-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:25px; border:3px solid #333; z-index:2000; border-radius:15px; width:85%; max-width:300px; text-align:center;">
    <h3>Admin Security</h3>
    <input type="password" id="admin-pass" placeholder="Password" style="width:90%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:5px;">
    <div style="display:flex; gap:10px;">
        <button onclick="verifyAdmin()" style="background:#000; color:white; flex:1; padding:10px; border-radius:5px; border:none; cursor:pointer;">Verify</button>
        <button onclick="document.getElementById('admin-modal').style.display='none'" style="background:#ccc; color:black; flex:1; padding:10px; border-radius:5px; border:none; cursor:pointer;">Close</button>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
