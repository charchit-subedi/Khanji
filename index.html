<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>JLPT Mastery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="menu" class="container">
    <h1>JLPT Practice</h1>
    <h3>Select Mode</h3>
    <select id="mode">
      <option value="kanji_practice">Kanji Practice</option>
      <option value="kanji_test">Kanji Test</option>
      <option value="word_practice">Word Practice (Batch)</option>
      <option value="word_test">Word Test (Typing)</option>
    </select>

    <h3>Select Level</h3>
    <select id="level">
      <option value="N5">N5</option>
      <option value="N4">N4</option>
      <option value="N3">N3</option>
    </select>
    
    <button id="startBtn" onclick="startApp()" style="background: #ffa500; color: white;" disabled>Loading Data...</button>
  </div>

  <div id="app" class="container" style="display:none;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
      <h2 id="modeTitle" style="margin: 0; font-size: 1rem; color: #666;">MODE</h2>
      <div id="score-board">Score: <span id="score">0</span></div>
    </div>

    <div id="question-box">
      <h1 id="question">---</h1>
      <div id="arrow">↓</div>
      <div id="meaning-display">Initializing...</div>
    </div>

    <canvas id="canvas" width="300" height="400"></canvas>
    
    <div id="test-input-area" style="display:none; margin: 20px 0; padding: 15px; background: #f9f9f9; border: 2px solid #4CAF50; border-radius: 10px;">
      <label style="display:block; margin-bottom: 10px; font-weight: bold; color: #2e7d32;">Meaning in English:</label>
      <input type="text" id="answer-input" placeholder="Type here..." style="width: 90%; padding: 12px; font-size: 1.2rem; border-radius: 5px; border: 1px solid #ccc;">
    </div>

    <div style="display: flex; gap: 10px; margin-top: 15px;">
      <button onclick="clearCanvas()" style="background: #9e9e9e; flex: 1; color: white;">Clear</button>
      <button onclick="checkAction()" style="flex: 2; background: #4CAF50; color: white;">Check</button>
    </div>
    
    <button id="nextBtn" onclick="nextQuestion()" style="display:none; background: #2196F3; color: white; margin-top: 10px;">Next →</button>
    <p id="result" style="font-weight: bold; margin-top: 15px;"></p>
    <button onclick="goBack()" style="background: #f44336; margin-top: 20px; color: white;">Back</button>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
