<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JLPT Mastery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="menu" class="container">
    <h1>JLPT Practice</h1>
    <h3>Select Mode</h3>
    <select id="mode">
      <option value="kanji_practice">Kanji Practice</option>
      <option value="kanji_test">Kanji Test</option>
      <option value="word_practice">Word Practice</option>
    </select>

    <h3>Select Level</h3>
    <select id="level">
      <option value="N5">N5</option>
      <option value="N4">N4</option>
      <option value="N3">N3</option>
    </select>
    
    <button id="startBtn" onclick="startApp()" style="background: #ffa500;" disabled>Loading Data...</button>
  </div>

  <div id="app" class="container" style="display:none;">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h2 id="modeTitle">MODE</h2>
      <div id="score-board">Score: <span id="score">0</span></div>
    </div>

    <div id="question-box">
      <h1 id="question">---</h1>
      <div id="arrow">↓</div>
      <div id="meaning-display">Initializing...</div>
    </div>

    <canvas id="canvas" width="300" height="400"></canvas>
    
    <div id="test-input-area" style="display:none; margin: 10px 0;">
      <input type="text" id="answer-input" placeholder="Type English meaning..." style="width:80%; padding:10px;">
    </div>

    <div style="display: flex; gap: 10px; margin-top: 15px;">
      <button onclick="clearCanvas()" style="background: #9e9e9e; flex: 1;">Clear</button>
      <button onclick="checkAction()" style="flex: 2;">Check</button>
    </div>
    
    <button id="nextBtn" onclick="nextQuestion()" style="display:none; background: #2196F3;">Next →</button>
    <p id="result" style="font-weight: bold;"></p>
    <button onclick="goBack()" style="background: #f44336; margin-top: 20px;">Back</button>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
