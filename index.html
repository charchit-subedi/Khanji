<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JLPT Practice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="menu" class="container">
  <h1>JLPT Practice</h1>
  <h3>Select Mode</h3>
  <select id="mode">
    <option value="kanji_practice">Kanji Practice</option>
    <option value="kanji_test">Kanji Test</option>
    <option value="word_practice">Word Practice</option>
    <option value="word_test">Word Test</option>
    <option value="all_test">All Test</option>
    <option value="jlpt_mock">JLPT Mock Test</option>
  </select>

  <h3>Select Level</h3>
  <select id="level">
    <option value="N5">N5</option>
    <option value="N4">N4</option>
    <option value="N3">N3</option>
  </select>

  <button onclick="startApp()">Start</button>
</div>

<div id="app" class="container" style="display:none;">
  <h2 id="modeTitle"></h2>

  <div id="question-box">
    <h1 id="question">---</h1>
    <div id="arrow">↓</div>
    <h3 id="meaning-display">Meaning</h3>
  </div>

  <canvas id="canvas" width="300" height="400"></canvas>
  
  <button onclick="clearCanvas()" class="btn-clear">Clear</button>
  <button onclick="checkKanji()" class="btn-check">Check</button>
  
  <button id="nextBtn" onclick="nextQuestion()" style="display:none;" class="btn-next">Next</button>

  <p id="result"></p>

  <button onclick="goBack()" class="btn-back">Back</button>
</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="script.js"></script>

</body>
</html>
