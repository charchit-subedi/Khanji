<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JLPT Kanji Mastery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="menu" class="container">
    <h1>JLPT Mastery</h1>
    
    <div class="selection-group">
      <h3>Select Mode</h3>
      <select id="mode">
        <option value="kanji_practice">Kanji Practice</option>
        <option value="kanji_test">Kanji Test</option>
        <option value="word_practice">Word Practice</option>
        <option value="word_test">Word Test</option>
      </select>

      <h3>Select Level</h3>
      <select id="level">
        <option value="N5">N5</option>
        <option value="N4">N4</option>
        <option value="N3">N3</option>
      </select>
    </div>

    <button class="btn-start" onclick="startApp()">Start Learning</button>
  </div>

  <div id="app" class="container" style="display:none;">
    <div class="header-nav">
      <h2 id="modeTitle">MODE</h2>
      <div id="score-board">Score: <span id="score">0</span></div>
    </div>

    <div id="question-box">
      <h1 id="question">---</h1>
      <div id="arrow">↓</div>
      <h3 id="meaning-display">Loading...</h3>
    </div>

    <canvas id="canvas" width="300" height="400"></canvas>
    
    <div class="control-buttons">
      <button onclick="clearCanvas()" class="btn-clear">Clear</button>
      <button onclick="checkKanji()" class="btn-check">Check Kanji</button>
    </div>
    
    <button id="nextBtn" onclick="nextQuestion()" style="display:none;" class="btn-next">Next Challenge →</button>

    <p id="result"></p>

    <button onclick="goBack()" class="btn-back">Return to Menu</button>
  </div>

  <script type="module" src="js/app.js"></script>

</body>
</html>
