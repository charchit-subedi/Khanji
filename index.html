<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JLPT Practice App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ===== MENU SCREEN ===== -->
  <div id="menu" class="container">
    <h1>JLPT Practice</h1>

    <!-- Mode Selection -->
    <h3>Select Mode</h3>
    <select id="mode">
      <option value="kanji_practice">Kanji Practice</option>
      <option value="kanji_test">Kanji Test</option>
      <option value="word_practice">Word Practice</option>
      <option value="word_test">Word Test</option>
      <option value="all_test">All (Kanji + Word Test)</option>
      <option value="jlpt_mock">JLPT Mock Test</option>
    </select>

    <!-- Level Selection -->
    <h3>Select Level</h3>
    <select id="level">
      <option value="N5">N5</option>
      <option value="N4">N4</option>
      <option value="N3">N3</option>
    </select>

    <!-- Start Button -->
    <button onclick="startApp()">Start</button>
  </div>


  <!-- ===== PRACTICE / TEST SCREEN ===== -->
  <div id="app" class="container" style="display:none;">

    <h2 id="modeTitle"></h2>

    <!-- Question Display -->
    <div id="question-box">
      <h2 id="question">---</h2>
    </div>

    <!-- Drawing Canvas (for kanji) -->
    <canvas id="canvas" width="300" height="300"></canvas>
    <button onclick="clearCanvas()">Clear</button>

    <!-- Answer Input -->
    <input type="text" id="answer" placeholder="Enter meaning">

    <!-- Buttons -->
    <div>
      <button onclick="checkAnswer()">Check</button>
      <button onclick="nextQuestion()">Next</button>
    </div>

    <!-- Result -->
    <p id="result"></p>

    <!-- Back to Menu -->
    <button onclick="goBack()">Back</button>

  </div>


  <!-- Firebase -->
  <script type="module" src="firebase.js"></script>

  <!-- Main Script -->
  <script type="module" src="script.js"></script>

</body>
</html>
